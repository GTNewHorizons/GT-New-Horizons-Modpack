# This workflow will build and release a zip of the modpack config and script files.

name: Release tagged version

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.8.0
        with:
          access_token: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          
      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Bundle matching GTNH-Guide-Pack release
        if: contains(github.ref_name, '-nightly-')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUIDE_REPO: GTNewHorizons/GTNH-Guide-Pack
        run: |
          set -euo pipefail
          if [[ "${RELEASE_VERSION}" == *-pre ]]; then
            # Experimental modpack release: newest guide release of any tag.
            GUIDE_TAG=$(gh release list --repo "$GUIDE_REPO" --limit 100 \
              --json tagName,createdAt,isDraft \
              --jq '[.[] | select(.isDraft | not)]
                    | select(.tagName != "guide-page-lang-dev-build")
                    | sort_by(.createdAt) | reverse | .[0].tagName // empty')
          else
            # Daily modpack release: newest guide release whose tag is not -pre.
            GUIDE_TAG=$(gh release list --repo "$GUIDE_REPO" --limit 100 \
              --json tagName,createdAt,isDraft \
              --jq '[.[] | select(.isDraft | not)
                          | select(.tagName != "guide-page-lang-dev-build")
                          | select(.tagName | endswith("-pre") | not)]
                    | sort_by(.createdAt) | reverse | .[0].tagName // empty')
          fi
          if [[ -z "$GUIDE_TAG" ]]; then
            echo "No matching GTNH-Guide-Pack release found" >&2
            exit 1
          fi
          echo "Selected GTNH-Guide-Pack release: $GUIDE_TAG"
          mkdir -p config/guidenh
          rm -f config/guidenh/DefaultGuide.zip
          gh release download "$GUIDE_TAG" --repo "$GUIDE_REPO" \
            --pattern '*.zip' \
            --dir config/guidenh
          GUIDE_ZIP=$(find config/guidenh -maxdepth 1 -type f -name '*.zip' ! -name 'DefaultGuide.zip' | head -n 1)
          if [[ -z "$GUIDE_ZIP" ]]; then
            echo "Downloaded GTNH-Guide-Pack zip asset was not found" >&2
            exit 1
          fi
          mv "$GUIDE_ZIP" config/guidenh/DefaultGuide.zip

      - name: Prepare release folder
        run: |
          mkdir -p release
      
      - name: Create release zip
        run: |
          zip -r release/${{ env.RELEASE_VERSION }}.zip . \
              -x changelog.py \
              -x ".git/*" \
              -x ".github/*" \
              -x "release/*"

      - name: Release under current tag
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "${{ env.RELEASE_VERSION }}"
          prerelease: false
          title: "${{ env.RELEASE_VERSION }}"
          files: release/*
