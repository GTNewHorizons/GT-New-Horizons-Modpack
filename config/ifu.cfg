# Configuration file

general {
    # Extra non-ore blocks allowed by Ore Finder. Use the block Item ID with an optional metadata suffix: "minecraft:cobblestone" matches any metadata, "gregtech:gt.blockores2:307" matches that specific one [default: ]
    S:Allowlist <
        etfuturum:amethyst_block
        etfuturum:amethyst_cluster_1
        etfuturum:amethyst_cluster_2
     >

    # Blocks the Ore Finder must never search for, that it would otherwise match on its own. Use the block Item ID, same rules as Allowlist [default: ]
    S:Blocklist <
        minecraft:chest
     >

    # If true, right-clicking a block with the Ore Finder prints: the block's name, metadata and ore material/flags, plus the material internalName(s) the item inside the wand resolves to (can be used by Material Blocklist). Useful for diagnosing ore matching and for finding what to put in an Allow/Block list [default: false]
    B:"Debug block info"=false

    # If this is set to false, the OreFinder will only work in the Owerworld, Nether and Twilight Forest [default: false]
    B:"Enable Everywhere"=false

    # Ore materials the Ore Finder must never search for. Use the material name printed by the Debug block info option, for example: "Gold" or "MeteoricIron". [default: ]
    S:"Material Blocklist" <
        EnderPearl
     >

    # If true, Ore finder will play sounds [default: true]
    B:Sounds=true

    #  change scanning radius from player [range: 1 ~ 16, default: 5]
    I:"X Z Area radius"=4

    #  change scanning distance above and below the player [range: 1 ~ 60, default: 60]
    I:"Y Area radius"=60
}


